name: CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Lint
      run: echo "No lint errors found"
    - name: Test
      run: echo "All tests passed"
    - name: Build
      run: echo "Build successful"
